name: Deploy Wedding Planner to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "github-pages"
  cancel-in-progress: false

jobs:
  build:
    name: Build Angular app
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Angular app
        run: npm run build -- --base-href=/wedding-planner-app/

      - name: Prepare GitHub Pages artifact
        run: |
          if [ -d "dist/wedding-planner/browser" ]; then
            cp dist/wedding-planner/browser/index.html dist/wedding-planner/browser/404.html
            echo "PAGES_PATH=dist/wedding-planner/browser" >> $GITHUB_ENV
          else
            cp dist/wedding-planner/index.html dist/wedding-planner/404.html
            echo "PAGES_PATH=dist/wedding-planner" >> $GITHUB_ENV
          fi

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ${{ env.PAGES_PATH }}

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
